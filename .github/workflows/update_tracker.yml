name: Update LLM Tracker

on:
  schedule:
    # 每 6 小時執行一次增量更新
    - cron: '0 */6 * * *'
  workflow_dispatch: # 允許手動觸發

# 排隊鎖：防止兩個 workflow 同時 Push 產生 Race Condition
concurrency:
  group: production_deploy
  cancel-in-progress: false

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies (with latest yt-dlp)
        run: |
          pip install -U pip
          pip install -U yt-dlp
          pip install -r requirements.txt
          pip install pytest

      - name: Run unit tests (fail-fast)
        run: python -m pytest tests -q --tb=short

      - name: Run incremental pipeline
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python main.py

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # 先暫存所有 Pipeline 產生的數據文件，避免 rebase 時報 unstaged changes
          git add data.json data.js processed_videos.json quota_state.json
          git diff --staged --quiet || git commit -m "chore: auto-update tracker data [$(date -u +'%Y-%m-%dT%H:%M:%SZ')]"
          git pull --rebase origin main
          git push
